source":"54581c43","target":"1be556eb","confidence":0.15,"description":"英国养老金危机，英镑暴跌 → 硅谷银行倒闭，银行业危机爆发"},{"source":"3203a13e","target":"263e1bc5","confidence":0.28,"description":"美联储放缓加息至50基点 → 美联储暗示加息接近尾声"},{"source":"3203a13e","target":"845b3cd0","confidence":0.23,"description":"美联储放缓加息至50基点 导致 美联储最后一次加息，利率达5.25%"},{"source":"263e1bc5","target":"845b3cd0","confidence":0.28,"description":"美联储暗示加息接近尾声 导致 美联储最后一次加息，利率达5.25%"},{"source":"2b34aea1","target":"978caec3","confidence":0.25,"description":"FTX交易所破产，加密信任危机 → CPI通胀开始回落"},{"source":"2b34aea1","target":"3203a13e","confidence":0.25,"description":"FTX交易所破产，加密信任危机 → 美联储放缓加息至50基点"},{"source":"2b34aea1","target":"1be556eb","confidence":0.23,"description":"FTX交易所破产，加密信任危机 → 硅谷银行倒闭，银行业危机爆发"},{"source":"1be556eb","target":"263e1bc5","confidence":0.25,"description":"硅谷银行倒闭，银行业危机爆发 → 美联储暗示加息接近尾声"},{"source":"bece58a6","target":"be3e0a60","confidence":0.2,"description":"美国房地产市场降温，房价开始下跌 → 美元指数飙升至108，新兴市场承压"},{"source":"bece58a6","target":"40200e9b","confidence":0.18,"description":"美国房地产市场降温，房价开始下跌 → 半导体周期下行，芯片股暴跌"},{"source":"bece58a6","target":"54581c43","confidence":0.15,"description":"美国房地产市场降温，房价开始下跌 → 英国养老金危机，英镑暴跌"},{"source":"be3e0a60","target":"54581c43","confidence":0.15,"description":"美元指数飙升至108，新兴市场承压 → 英国养老金危机，英镑暴跌"},{"source":"be3e0a60","target":"40200e9b","confidence":0.15,"description":"美元指数飙升至108，新兴市场承压 → 半导体周期下行，芯片股暴跌"},{"source":"40200e9b","target":"2b34aea1","confidence":0.15,"description":"半导体周期下行，芯片股暴跌 → FTX交易所破产，加密信任危机"},{"source":"40200e9b","target":"978caec3","confidence":0.15,"description":"半导体周期下行，芯片股暴跌 → CPI通胀开始回落"},{"source":"40200e9b","target":"3203a13e","confidence":0.15,"description":"半导体周期下行，芯片股暴跌 → 美联储放缓加息至50基点"}]};

// 坐标计算
const timeExtent = [new Date('2022-03-01'), new Date('2023-08-01')];
const tsRange = timeExtent[1] - timeExtent[0];

const categories = [
  {name:'货币政策', itemStyle:{color:'#FF6B6B'}},
  {name:'加密货币', itemStyle:{color:'#F7931A'}},
  {name:'房地产',   itemStyle:{color:'#4ECDC4'}},
  {name:'汇率',     itemStyle:{color:'#45B7D1'}},
  {name:'半导体',   itemStyle:{color:'#96CEB4'}},
  {name:'通胀',     itemStyle:{color:'#FFEAA7'}},
  {name:'银行业',   itemStyle:{color:'#DDA0DD'}}
];

const nodes = rawData.nodes.map(n => {
  const ts = new Date(n.timestamp).getTime();
  const x = ((ts - timeExtent[0].getTime()) / tsRange) * 100;
  const y = n.domain * 15 + n.depth * 5;
  const symbolSize = n.isRoot ? 55 : n.isLeaf ? 35 : 25 + (rawData.edges.filter(e => e.source === n.id || e.target === n.id).length) * 3;
  return {
    id: n.id,
    name: n.name,
    x: x,
    y: y,
    symbolSize: symbolSize,
    category: n.domain,
    itemStyle: { color: n.color, borderColor: '#fff', borderWidth: n.isRoot ? 3 : 1 },
    label: { show: true, position: 'bottom', fontSize: 10, color: '#ddd', formatter: n.name.length > 14 ? n.name.slice(0,14)+'…' : n.name },
    tooltip: { formatter: function() {
      return `<b>${n.name}</b><br/>时间: ${n.timestamp}<br/>领域: ${n.domainName}<br/>深度: 第${n.depth}轮${n.isRoot ? ' (根因)' : ''}${n.isLeaf ? ' (叶事件)' : ''}`;
    }},
    _raw: n
  };
});

const links = rawData.edges.map(e => ({
  source: e.source,
  target: e.target,
  value: e.confidence,
  lineStyle: {
    color: e.confidence >= 0.35 ? '#FF6B6B' : e.confidence >= 0.25 ? '#FFA500' : '#333',
    width: e.confidence >= 0.35 ? 3 : e.confidence >= 0.25 ? 1.5 : 0.5,
    opacity: e.confidence >= 0.25 ? 0.8 : 0.3,
    curveness: 0.2
  },
  label: { show: e.confidence >= 0.35, formatter: Math.round(e.confidence*100)+'%', fontSize: 9, color: '#FFD700' },
  _raw: e
}));

// 初始化图表
const chart = echarts.init(document.getElementById('chart'), 'dark');

const option = {
  backgroundColor: '#0a0a1a',
  tooltip: { 
    trigger: 'item',
    backgroundColor: 'rgba(15,15,35,0.95)',
    borderColor: '#444',
    textStyle: { color: '#fff', fontSize: 12 }
  },
  series: [{
    type: 'graph',
    layout: 'none',
    roam: true,
    data: nodes,
    links: links,
    categories: categories,
    edgeSymbol: ['none', 'arrow'],
    edgeSymbolSize: [0, 10],
    emphasis: {
      focus: 'adjacency',
      lineStyle: { width: 4 },
      itemStyle: { shadowBlur: 20, shadowColor: 'rgba(255,255,255,0.3)' }
    },
    lineStyle: { curveness: 0.2 },
    animationDuration: 1500,
    animationEasingUpdate: 'quinticInOut'
  }]
};

chart.setOption(option);
window.addEventListener('resize', () => chart.resize());

// 控制函数
let labelsVisible = true;
function toggleLabels() {
  labelsVisible = !labelsVisible;
  chart.setOption({ series: [{ data: nodes.map(n => ({...n, label: {...n.label, show: labelsVisible}})) }] });
}

function resetView() {
  chart.setOption(option, true);
}

function highlightRoot() {
  const rootEdges = rawData.edges.filter(e => e.source === '1690c596');
  const rootTargets = new Set(rootEdges.map(e => e.target));
  rootTargets.add('1690c596');
  
  chart.setOption({
    series: [{
      data: nodes.map(n => ({
        ...n,
        itemStyle: {
          ...n.itemStyle,
          opacity: rootTargets.has(n.id) ? 1 : 0.15
        }
      })),
      links: links.map(l => ({
        ...l,
        lineStyle: {
          ...l.lineStyle,
          opacity: l._raw.source === '1690c596' ? 1 : 0.05
        }
      }))
    }]
  });
}

function exportImage() {
  const url = chart.getDataURL({ type: 'png', pixelRatio: 2, backgroundColor: '#0a0a1a' });
  const a = document.createElement('a');
  a.href = url;
  a.download = 'causal_network.png';
  a.click();
}
</script>
